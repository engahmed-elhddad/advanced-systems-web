  <line x1="460" y1="500" x2="500" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="480" y1="500" x2="520" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="500" y1="500" x2="540" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="520" y1="500" x2="560" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="540" y1="500" x2="580" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="560" y1="500" x2="600" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="580" y1="500" x2="620" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="600" y1="500" x2="640" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="620" y1="500" x2="660" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="640" y1="500" x2="680" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="660" y1="500" x2="700" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="680" y1="500" x2="720" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="700" y1="500" x2="740" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="720" y1="500" x2="760" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="740" y1="500" x2="780" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="760" y1="500" x2="800" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="780" y1="500" x2="820" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="800" y1="500" x2="840" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="820" y1="500" x2="860" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>
  <line x1="840" y1="500" x2="880" y2="600" stroke="rgba(30,45,79,0.25)" stroke-width="1"/>

  <!-- Circuit traces on upper portion -->
  <path d="M 230 40 L 380 40 L 380 100 L 430 100" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1"/>
  <path d="M 230 60 L 350 60 L 350 120 L 430 120" fill="none" stroke="rgba(14,165,233,0.07)" stroke-width="1"/>
  <path d="M 770 40 L 820 40 L 820 100 L 970 100" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1"/>
  <path d="M 770 60 L 850 60 L 850 120 L 970 120" fill="none" stroke="rgba(14,165,233,0.07)" stroke-width="1"/>
  <!-- Via dots -->
  <circle cx="380" cy="40" r="2" fill="rgba(14,165,233,0.15)"/>
  <circle cx="350" cy="60" r="2" fill="rgba(14,165,233,0.1)"/>
  <circle cx="820" cy="40" r="2" fill="rgba(14,165,233,0.15)"/>
  <circle cx="850" cy="60" r="2" fill="rgba(14,165,233,0.1)"/>
