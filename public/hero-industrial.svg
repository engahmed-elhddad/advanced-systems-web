  <rect x="20" y="510" width="80" height="40" rx="2" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <rect x="120" y="510" width="80" height="40" rx="2" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <rect x="220" y="510" width="80" height="40" rx="2" fill="none" stroke="rgba(30,45,79,0.4)" stroke-width="1"/>
  <circle cx="60" cy="530" r="12" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="60" cy="530" r="6" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <circle cx="160" cy="530" r="12" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="160" cy="530" r="6" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>

  <!-- Conveyor right side -->
  <rect x="880" y="500" width="320" height="60" rx="0" fill="rgba(10,15,30,0.6)" stroke="rgba(30,45,79,0.5)" stroke-width="1"/>
  <circle cx="940" cy="530" r="12" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="940" cy="530" r="6" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <circle cx="1040" cy="530" r="12" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="1040" cy="530" r="6" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <circle cx="1140" cy="530" r="12" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="1140" cy="530" r="6" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>

