<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060c14;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="0.5"/>
    </pattern>
    <pattern id="smallGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="rgba(14,165,233,0.06)" stroke-width="0.3"/>
    </pattern>
  </defs>
  <!-- Base dark background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  <!-- Fine grid overlay -->
  <rect width="1200" height="600" fill="url(#smallGrid)"/>
  <!-- Coarse engineering grid -->
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Industrial structural elements — horizontal rails -->
  <rect x="0" y="148" width="1200" height="3" fill="rgba(30,45,79,0.5)"/>
  <rect x="0" y="149" width="1200" height="1" fill="rgba(14,165,233,0.08)"/>
  <rect x="0" y="298" width="1200" height="3" fill="rgba(30,45,79,0.5)"/>
  <rect x="0" y="299" width="1200" height="1" fill="rgba(14,165,233,0.08)"/>
  <rect x="0" y="448" width="1200" height="3" fill="rgba(30,45,79,0.5)"/>
  <rect x="0" y="449" width="1200" height="1" fill="rgba(14,165,233,0.08)"/>

  <!-- Industrial structural elements — vertical columns -->
  <rect x="198" y="0" width="3" height="600" fill="rgba(30,45,79,0.5)"/>
  <rect x="199" y="0" width="1" height="600" fill="rgba(14,165,233,0.06)"/>
  <rect x="598" y="0" width="3" height="600" fill="rgba(30,45,79,0.5)"/>
  <rect x="599" y="0" width="1" height="600" fill="rgba(14,165,233,0.06)"/>
  <rect x="998" y="0" width="3" height="600" fill="rgba(30,45,79,0.5)"/>
  <rect x="999" y="0" width="1" height="600" fill="rgba(14,165,233,0.06)"/>

  <!-- Control panel / PLC shapes — left cluster -->
  <rect x="30" y="80" width="140" height="90" rx="4" fill="none" stroke="rgba(30,45,79,0.7)" stroke-width="1.5"/>
  <rect x="40" y="90" width="50" height="30" rx="2" fill="rgba(14,165,233,0.04)" stroke="rgba(14,165,233,0.12)" stroke-width="0.8"/>
  <rect x="100" y="90" width="60" height="30" rx="2" fill="rgba(14,165,233,0.04)" stroke="rgba(30,45,79,0.5)" stroke-width="0.8"/>
  <rect x="40" y="130" width="120" height="8" rx="1" fill="rgba(30,45,79,0.5)"/>
  <circle cx="55" cy="150" r="5" fill="none" stroke="rgba(14,165,233,0.15)" stroke-width="1"/>
  <circle cx="75" cy="150" r="5" fill="none" stroke="rgba(14,165,233,0.15)" stroke-width="1"/>
  <circle cx="95" cy="150" r="5" fill="none" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <circle cx="115" cy="150" r="5" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <circle cx="135" cy="150" r="5" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>
  <circle cx="155" cy="150" r="5" fill="none" stroke="rgba(30,45,79,0.6)" stroke-width="1"/>

  <!-- Control panel / PLC shapes — right cluster -->
  <rect x="1030" y="80" width="140" height="90" rx="4" fill="none" stroke="rgba(30,45,79,0.7)" stroke-width="1.5"/>
  <rect x="1040" y="90" width="50" height="30" rx="2" fill="rgba(14,165,233,0.04)" stroke="rgba(14,165,233,0.12)" stroke-width="0.8"/>
  <rect x="1100" y="90" width="60" height="30" rx="2" fill="rgba(14,165,233,0.04)" stroke="rgba(30,45,79,0.5)" stroke-width="0.8"/>
  <rect x="1040" y="130" width="120" height="8" rx="1" fill="rgba(30,45,79,0.5)"/>

