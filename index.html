<!DOCTYPE html>
<html>
<head>
    <title>Advanced Systems - Industrial Search</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            padding: 40px;
        }

        h1 {
            color: #4da6ff;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #4da6ff;
            border: none;
            color: white;
            cursor: pointer;
        }

        .result {
            background: #1c1c1c;
            padding: 15px;
            margin-top: 10px;
            border-left: 4px solid #4da6ff;
        }

        .pagination {
            margin-top: 20px;
        }

        .pagination button {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<h1>Advanced Systems Industrial Search</h1>

<input type="text" id="searchInput" placeholder="Enter Part Number">
<button onclick="search()">Search</button>

<div id="results"></div>

<div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <button onclick="nextPage()">Next</button>
</div>

<script>
    let currentPage = 1;
    let currentQuery = "";

    async function search(page = 1) {
        const query = document.getElementById("searchInput").value;
        if (!query) return;

        currentQuery = query;
        currentPage = page;

        const response = await fetch(
            `http://127.0.0.1:8000/search?part=${query}&page=${page}&limit=5`
        );

        const data = await response.json();

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (data.results.length === 0) {
            resultsDiv.innerHTML = "<p>No results found</p>";
            return;
        }

        data.results.forEach(item => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
                <strong>${item.part_number}</strong><br>
                Price: ${item.price || "N/A"}<br>
                Availability: ${item.availability || "N/A"}
            `;
            resultsDiv.appendChild(div);
        });
    }

    function nextPage() {
        search(currentPage + 1);
    }

    function prevPage() {
        if (currentPage > 1) {
            search(currentPage - 1);
        }
    }
</script>

</body>
</html>
